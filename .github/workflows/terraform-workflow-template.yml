name: Terraform Action Workflow Template

on:
  pull_request:
    branches:
      - main
    paths:
      - '**'
  workflow_dispatch:
env:
  TF_VERSION: "1.6.3"
  WORKING_DIR: "."
  #ENVIRONMENT: "dev"
  TFSEC_VERSION: "1.28.6"

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      security-events: write
      actions: read
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH Key for Private Module Access
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id:  ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      
    #   - name: Install tfsec
    #     run: |
    #       wget -q https://github.com/aquasecurity/tfsec/releases/download/v${{ env.TFSEC_VERSION }}/tfsec-linux-amd64 -O tfsec
    #       chmod +x tfsec
    #       sudo mv tfsec /usr/local/bin/tfsec
    #       tfsec --version

    #   - name: Run tfsec scan
    #     run: |
    #       echo "scanning directory: $(pwd)"
    #       tfsec . --soft-fail
    #       echo "tfsec scan complete"
      
    #   - name: Save tfsec SARIF report
    #     if: always()
    #     run: |
    #       tfsec . --format sarif --soft-fail > tfsec.sarif || true
          
    #   - name: Upload tfsec results to GitHub Security tab
    #     uses: github/codeql-action/upload-sarif@v3
    #     if: always()
    #     with:
    #       sarif_file: tfsec.sarif

    #   - name: Save tfsec report as artifact
    #     uses: actions/upload-artifact@v4
    #     if: always()
    #     with:
    #       name: tfsec-report
    #       path: tfsec.sarif
    #       retention-days: 30
      
      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var-file=bootstrap.tfvars -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days:    1

  approval:
    needs: terraform-plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: 
      name: terraform
      url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Approval Required
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Approval Required"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo " Approval granted - proceeding to apply"

  terraform-plan-after-approval:
    name: Terraform Plan (Post Approval)
    needs: approval
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions:  read
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH Key for Private Module Access
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id:                 ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      # Fresh plan after approval — this is the plan that will be applied
      - name: Terraform Plan
        run: terraform plan -var-file=bootstrap.tfvars -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name:           tfplan-after-approval
          path:           ${{ env.WORKING_DIR }}/tfplan
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# APPLY — Runs after the second plan succeeds
# Uses the fresh plan generated after approval
# ─────────────────────────────────────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    needs: terraform-plan-after-approval
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions:  read
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH Key for Private Module Access
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id:                 ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Terraform Init
        run: terraform init

      # Download the fresh plan generated after approval
      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-after-approval
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply tfplan

      - name: Apply Complete
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Terraform Apply completed successfully"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"