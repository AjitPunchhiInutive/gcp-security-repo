name: Terraform Action Workflow Template

on:
  pull_request:
    branches:
      - main
    paths:
      - '**'
  workflow_dispatch:

env:
  TF_VERSION: "1.6.3"
  WORKING_DIR: "."
  TFSEC_VERSION: "1.28.6"

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      security-events: write
      actions: read
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH Key for Private Module Access
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id:  ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Force-unlock stale state lock if present
        run: |
          # A cancelled run may leave a GCS state lock unreleased.
          # Try both gcloud storage (WIF-native) and gsutil to cover auth differences.
          LOCK_FILE="gs://itp-terraform-test/gcp-security-foundation/state/default.tflock"
          if gcloud storage rm "$LOCK_FILE" --quiet 2>/dev/null; then
            echo "Lock removed via gcloud storage rm."
          elif gsutil rm "$LOCK_FILE" 2>/dev/null; then
            echo "Lock removed via gsutil rm."
          else
            echo "No stale state lock found (or already removed)."
          fi

      - name: Remove stale V1 state entries for .managed. constraints
        run: |
          # V1 API (google_folder/project_organization_policy) rejects constraints containing
          # ".managed." — remove any such stale state entries so the plan refresh doesn't fail.
          # The module now routes .managed. constraints to V2 (google_org_policy_policy).
          stale=$(terraform state list -lock=false 2>/dev/null | grep -E \
            '(google_folder_organization_policy|google_project_organization_policy)\.' | \
            grep -E '"constraints/[^"]+\.managed\.') || true
          if [ -z "$stale" ]; then
            echo "No stale .managed. V1 state entries found."
          else
            while IFS= read -r resource; do
              echo "Removing stale V1 state entry: $resource"
              terraform state rm -lock=false "$resource" || true
            done <<< "$stale"
          fi

      - name: Import existing V2 managed and dry-run policies into state
        run: |
          # These V2 resources (google_org_policy_policy) already exist in GCP but may not be
          # in Terraform state. Importing them prevents 409 "entity already exists" errors
          # during apply. Safe to run every time — silently skipped if already in state.
          FOLDER="1048391613319"

          TFVARS="-var-file=gcp-security-repo.tfvars -lock=false"

          # ── UDP module: .managed. boolean policies (V1 state entries were removed above) ──
          terraform import $TFVARS \
            'module.orgpolicy["sw-unified-data-platform/sw-unified-data-platform-folder.yaml"].google_org_policy_policy.managed_boolean_policies["constraints/compute.managed.allowedVlanAttachmentEncryption"]' \
            "folders/${FOLDER}/policies/compute.managed.allowedVlanAttachmentEncryption" || true

          terraform import $TFVARS \
            'module.orgpolicy["sw-unified-data-platform/sw-unified-data-platform-folder.yaml"].google_org_policy_policy.managed_boolean_policies["constraints/dataflow.managed.disableUsePublicIps"]' \
            "folders/${FOLDER}/policies/dataflow.managed.disableUsePublicIps" || true

          terraform import $TFVARS \
            'module.orgpolicy["sw-unified-data-platform/sw-unified-data-platform-folder.yaml"].google_org_policy_policy.managed_boolean_policies["constraints/run.managed.requireInvokerIam"]' \
            "folders/${FOLDER}/policies/run.managed.requireInvokerIam" || true

          # ── Networking module: .managed. boolean policies (never in state) ──────────────
          terraform import $TFVARS \
            'module.orgpolicy["sw-ent-networking/sw-ent-networking-folder.yaml"].google_org_policy_policy.managed_boolean_policies["constraints/compute.managed.allowedVlanAttachmentEncryption"]' \
            "folders/${FOLDER}/policies/compute.managed.allowedVlanAttachmentEncryption" || true

          terraform import $TFVARS \
            'module.orgpolicy["sw-ent-networking/sw-ent-networking-folder.yaml"].google_org_policy_policy.managed_boolean_policies["constraints/dataflow.managed.disableUsePublicIps"]' \
            "folders/${FOLDER}/policies/dataflow.managed.disableUsePublicIps" || true

          terraform import $TFVARS \
            'module.orgpolicy["sw-ent-networking/sw-ent-networking-folder.yaml"].google_org_policy_policy.managed_boolean_policies["constraints/run.managed.requireInvokerIam"]' \
            "folders/${FOLDER}/policies/run.managed.requireInvokerIam" || true

          # ── Networking module: gcp.restrictServiceUsage dry_run (never in state) ────────
          terraform import $TFVARS \
            'module.orgpolicy["sw-ent-networking/sw-ent-networking-folder.yaml"].google_org_policy_policy.folder_list_dryrun_policies["constraints/gcp.restrictServiceUsage"]' \
            "folders/${FOLDER}/policies/gcp.restrictServiceUsage" || true

          # ── Security module: gcp.restrictServiceUsage dry_run (never in state) ─────────
          terraform import $TFVARS \
            'module.orgpolicy["sw-ent-security/sw-ent-security-folder.yaml"].google_org_policy_policy.folder_list_dryrun_policies["constraints/gcp.restrictServiceUsage"]' \
            "folders/${FOLDER}/policies/gcp.restrictServiceUsage" || true

      - name: Terraform Plan
        run: terraform plan -lock=false -var-file=gcp-security-repo.tfvars -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 1


  approval:
    needs: terraform-plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: terraform
      url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Approval Required
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Approval Required"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo " Approval granted - proceeding to apply"


  terraform-plan-after-approval:
    name: Terraform Plan (Post Approval)
    needs: approval
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH Key for Private Module Access
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id:                 ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -lock=false -var-file=gcp-security-repo.tfvars -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-after-approval
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 1


  terraform-apply:
    name: Terraform Apply
    needs: terraform-plan-after-approval
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH Key for Private Module Access
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id:                 ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Terraform Init
        run: terraform init

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-after-approval
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -parallelism=1 tfplan

      - name: Apply Complete
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Terraform Apply completed successfully"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
