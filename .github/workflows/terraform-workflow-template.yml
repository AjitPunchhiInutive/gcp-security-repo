name: Terraform Action Workflow Template

on:
  pull_request:
    branches:
      - main
    paths:
      - '**'
  workflow_dispatch:

env:
  TF_VERSION: "1.6.3"
  WORKING_DIR: "."
  TFSEC_VERSION: "1.28.6"

jobs:

# ─────────────────────────────────────────────────────────────────────────────
# PLAN — Runs on PR or manual trigger
# ─────────────────────────────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      security-events: write
      actions: read
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH Key for Private Module Access
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id:                 ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var-file=bootstrap.tfvars -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name:            tfplan
          path:            ${{ env.WORKING_DIR }}/tfplan
          retention-days:  1

# ─────────────────────────────────────────────────────────────────────────────
# APPROVAL GATE
# ─────────────────────────────────────────────────────────────────────────────
  approval:
    needs: terraform-plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: terraform
      url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Approval Required
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Approval Required"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo " Approval granted - proceeding to apply"

# ─────────────────────────────────────────────────────────────────────────────
# PLAN (POST APPROVAL) — Fresh plan after approval gate
# ─────────────────────────────────────────────────────────────────────────────
  terraform-plan-after-approval:
    name: Terraform Plan (Post Approval)
    needs: approval
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions:  read
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH Key for Private Module Access
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id:                 ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var-file=bootstrap.tfvars -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name:            tfplan-after-approval
          path:            ${{ env.WORKING_DIR }}/tfplan
          retention-days:  1

# ─────────────────────────────────────────────────────────────────────────────
# APPLY — Runs after the second plan succeeds
# Uses the fresh plan generated after approval
# ─────────────────────────────────────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    needs: terraform-plan-after-approval
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions:  read
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH Key for Private Module Access
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id:                 ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Terraform Init
        run: terraform init

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-after-approval
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply tfplan

      - name: Apply Complete
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Terraform Apply completed successfully"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

# ─────────────────────────────────────────────────────────────────────────────
# IMPORT — Standalone job, only runs when manually triggered
# Triggered via: Actions tab → "Terraform Action Workflow Template" → Run workflow
# Purpose: Import GCP resources that already exist into Terraform state
# to resolve 409 "entity already exists" errors on managed boolean policies
# ─────────────────────────────────────────────────────────────────────────────
  terraform-import:
    name: Terraform Import (Manual Only)
    runs-on: ubuntu-latest
    # Only runs on manual workflow_dispatch, never on PR
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
      actions:  read
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH Key for Private Module Access
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id:                 ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Terraform Init
        run: terraform init

      - name: Import constraints/iam.managed.disableServiceAccountKeyCreation
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Importing iam.managed.disableServiceAccountKeyCreation"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          terraform import \
            'module.orgpolicy["sw-unified-data-platform/sw-unified-data-platform-folder.yaml"].google_org_policy_policy.managed_boolean_policies["constraints/iam.managed.disableServiceAccountKeyCreation"]' \
            folders/1048391613319/policies/iam.managed.disableServiceAccountKeyCreation

      - name: Import constraints/dataflow.managed.blockProjectSshKeys
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Importing dataflow.managed.blockProjectSshKeys"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          terraform import \
            'module.orgpolicy["sw-unified-data-platform/sw-unified-data-platform-folder.yaml"].google_org_policy_policy.managed_boolean_policies["constraints/dataflow.managed.blockProjectSshKeys"]' \
            folders/1048391613319/policies/dataflow.managed.blockProjectSshKeys

      - name: Import constraints/iam.managed.preventPrivilegedBasicRolesForDefaultServiceAccounts
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Importing iam.managed.preventPrivilegedBasicRolesForDefaultServiceAccounts"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          terraform import \
            'module.orgpolicy["sw-unified-data-platform/sw-unified-data-platform-folder.yaml"].google_org_policy_policy.managed_boolean_policies["constraints/iam.managed.preventPrivilegedBasicRolesForDefaultServiceAccounts"]' \
            folders/1048391613319/policies/iam.managed.preventPrivilegedBasicRolesForDefaultServiceAccounts

      - name: Import Complete
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "All 3 resources imported into Terraform state"
          echo "409 errors will be resolved on next apply"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
