# ─────────────────────────────────────────────────────────────────────────────
# BOOLEAN POLICIES
# true  = constraint ENFORCED
# false = constraint NOT enforced
# ─────────────────────────────────────────────────────────────────────────────
policy_boolean:

  # ── KMS ──────────────────────────────────────────────────────────────────
  constraints/cloudkms.disableBeforeDestroy: true

  # ── Storage ──────────────────────────────────────────────────────────────
  constraints/storage.publicAccessPrevention: true
  constraints/storage.uniformBucketLevelAccess: true
  constraints/storage.secureHttpTransport: true

  # ── GCP / Audit ──────────────────────────────────────────────────────────
  constraints/gcp.detailedAuditLoggingMode: true

  # ── Compute ──────────────────────────────────────────────────────────────
  constraints/compute.skipDefaultNetworkCreation: true
  constraints/compute.disableVpcInternalIpv6: true
  constraints/compute.requireOsConfig: true
  constraints/compute.requireOsLogin: true
  constraints/compute.requireShieldedVm: true
  constraints/compute.setNewProjectDefaultToZonalDNSOnly: true
  constraints/compute.restrictXpnProjectLienRemoval: true
  constraints/compute.disableAllIpv6: true
  constraints/compute.disableGlobalSerialPortAccess: true
  constraints/compute.disableGuestAttributesAccess: true
  constraints/compute.disableSerialPortAccess: true
  constraints/compute.disableSerialPortLogging: true
  constraints/compute.disableGlobalCloudArmorPolicy: true
  constraints/compute.disableHybridCloudIpv6: true
  constraints/compute.disableInternetNetworkEndpointGroup: true
  constraints/compute.disableVpcExternalIpv6: true

  # FIX: compute.managed.allowedVlanAttachmentEncryption is a BooleanConstraint
  # per GCP API — cannot be set as a list policy. Setting true enforces IPSEC only.
  constraints/compute.managed.allowedVlanAttachmentEncryption: true

  # ── IAM ──────────────────────────────────────────────────────────────────
  constraints/iam.disableAuditLoggingExemption: true
  constraints/iam.automaticIamGrantsForDefaultServiceAccounts: true
  constraints/iam.restrictCrossProjectServiceAccountLienRemoval: true
  constraints/iam.disableServiceAccountCreation: true

  # ── IAM Managed (V2) ─────────────────────────────────────────────────────
  constraints/iam.managed.preventPrivilegedBasicRolesForDefaultServiceAccounts: true
  constraints/iam.managed.disableServiceAccountApiKeyCreation: true
  constraints/iam.managed.disableServiceAccountKeyCreation: true

  # ── AI Notebooks ─────────────────────────────────────────────────────────
  constraints/ainotebooks.disableRootAccess: true
  constraints/ainotebooks.requireAutoUpgradeSchedule: true
  constraints/ainotebooks.disableFileDownloads: true
  constraints/ainotebooks.restrictPublicIp: true

  # ── Pub/Sub ──────────────────────────────────────────────────────────────
  constraints/pubsub.enforceInTransitRegions: true

  # ── Dataflow Managed (V2) ─────────────────────────────────────────────────
  constraints/dataflow.managed.blockProjectSshKeys: true

  # ── Datastream ───────────────────────────────────────────────────────────
  constraints/datastream.disablePublicConnectivity: true

  # ── Cloud Run Managed (V2) ────────────────────────────────────────────────
  constraints/run.managed.requireInvokerIam: true

  # ── Compute Managed (V2) ──────────────────────────────────────────────────
  constraints/compute.managed.blockPreviewFeatures: true


# ─────────────────────────────────────────────────────────────────────────────
