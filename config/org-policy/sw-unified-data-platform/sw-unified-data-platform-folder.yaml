deploy: true
folder_id: "1048391613319"

# ─────────────────────────────────────────────────────────────────────────────
# BOOLEAN POLICIES
# true  = constraint ENFORCED
# false = constraint NOT enforced
# ─────────────────────────────────────────────────────────────────────────────
policy_boolean:

  # ── KMS ──────────────────────────────────────────────────────────────────
  constraints/cloudkms.disableBeforeDestroy: false                          # Prevent key destruction without scheduled delay

  # ── Storage ──────────────────────────────────────────────────────────────
  constraints/storage.publicAccessPrevention: true                            #  Boolean — blocks allUsers/allAuthenticatedUsers on all buckets
  constraints/storage.uniformBucketLevelAccess: true                          #  Enforce uniform bucket-level access
  constraints/storage.secureHttpTransport: true                               #   Deny unencrypted HTTP access to Storage

  # ── GCP / Audit ──────────────────────────────────────────────────────────
  constraints/gcp.detailedAuditLoggingMode: true                              #   Enable detailed request/response audit logging

  # ── Compute ──────────────────────────────────────────────────────────────
  constraints/compute.skipDefaultNetworkCreation: true                        #  Prevent auto-creation of default VPC
  constraints/compute.disableVpcInternalIpv6: true                            #  Disable internal IPv6 on VPCs
  constraints/compute.requireOsConfig: true                                   #  Require OS Config agent on VMs
  constraints/compute.requireOsLogin: true                                    #  Enforce OS Login for SSH access
  constraints/compute.requireShieldedVm: true                                 #  Require Shielded VM on new instances
  constraints/compute.setNewProjectDefaultToZonalDNSOnly: true                #  Use zonal DNS for new projects
  constraints/compute.restrictXpnProjectLienRemoval: true                     #  Require org-level permission to remove Shared VPC lien
  constraints/compute.disableAllIpv6: true                                    #  Disable all IPv6 across Compute resources
  constraints/compute.disableGlobalSerialPortAccess: true                     #  Disable serial port access globally
  constraints/compute.disableGuestAttributesAccess: true                      #  Disable guest attributes metadata access
  constraints/compute.disableSerialPortAccess: true                           #  Disable per-VM serial port access
  constraints/compute.disableSerialPortLogging: true                          #  Disable serial port logging to Cloud Logging
  constraints/compute.disableGlobalCloudArmorPolicy: true                     #  Disable global Cloud Armor policies
  constraints/compute.disableHybridCloudIpv6: true                            #  Disable IPv6 for hybrid connectivity
  constraints/compute.disableInternetNetworkEndpointGroup: true               #  Disable internet NEGs
  constraints/compute.disableVpcExternalIpv6: true                            #  Disable external IPv6 on VPCs

  # ── IAM ──────────────────────────────────────────────────────────────────
  constraints/iam.disableAuditLoggingExemption: true                          #  Prevent exemptions from audit logging
  constraints/iam.automaticIamGrantsForDefaultServiceAccounts: true           #  Disable automatic IAM grants for default SAs
  constraints/iam.restrictCrossProjectServiceAccountLienRemoval: true        #  Prevent cross-project SA lien removal
  constraints/iam.disableServiceAccountCreation: true                         # ⚠ VERY RESTRICTIVE — blocks ALL SA creation in folder

  # ── IAM Managed (V2 multi-dot constraints) ───────────────────────────────
  constraints/iam.managed.preventPrivilegedBasicRolesForDefaultServiceAccounts: true  #  Block Owner/Editor on default SAs
  constraints/iam.managed.disableServiceAccountApiKeyCreation: true          #  Disable SA API key creation (managed V2)
  constraints/iam.managed.disableServiceAccountKeyCreation: true             #  Disable SA key creation (managed V2)

  # ── AI Notebooks ─────────────────────────────────────────────────────────
  constraints/ainotebooks.disableRootAccess: true                            # Disable root in notebook instances
  constraints/ainotebooks.requireAutoUpgradeSchedule: true                   #  Require auto-upgrade schedule
  constraints/ainotebooks.disableFileDownloads: true                         #  Block file downloads from notebooks
  constraints/ainotebooks.restrictPublicIp: true                             #  Restrict public IPs on notebook instances

  # ── Pub/Sub ──────────────────────────────────────────────────────────────
  constraints/pubsub.enforceInTransitRegions: true                           # Enforce in-transit region restrictions

  # ── Dataflow Managed (V2 multi-dot constraints) ──────────────────────────
  constraints/dataflow.managed.disableUsePublicIps: true                     # Disable public IPs for Dataflow (managed V2)
  constraints/dataflow.managed.blockProjectSshKeys: true                     # Block project-level SSH keys for Dataflow (managed V2)

  # ── Datastream ───────────────────────────────────────────────────────────
  constraints/datastream.disablePublicConnectivity: true                     # Disable public connectivity for Datastream

  # ── Cloud Run Managed (V2 multi-dot constraint) ──────────────────────────
  constraints/run.managed.requireInvokerIam: true                            # Require IAM authentication for Cloud Run invokers

  # ── Compute Managed (V2 multi-dot constraint) ────────────────────────────
  constraints/compute.managed.blockPreviewFeatures: true                     # Block preview/beta Compute features


# ─────────────────────────────────────────────────────────────────────────────
# LIST POLICIES
# status: true  + values = ALLOW only listed values
# status: false + values = DENY listed values
# status: true  + values: [] = ⚠ ALLOW NOTHING (deny all) — see warnings below
# ─────────────────────────────────────────────────────────────────────────────
policy_list:

  # ── KMS ──────────────────────────────────────────────────────────────────
  constraints/cloudkms.minimumDestroyScheduledDuration:
    inherit_from_parent: false
    suggested_value: "90d"
    status: true
    values:
      - "90d"                                                                 #  Minimum 90-day scheduled key destruction

  # ── Compute ──────────────────────────────────────────────────────────────
  constraints/compute.vmExternalIpAccess:
    inherit_from_parent: false
    suggested_value: ""
    status: true
    values: []                                                                #  INTENTIONAL — empty allow = deny ALL external IPs on VMs

  constraints/compute.requireVpcFlowLogs:
    inherit_from_parent: false
    suggested_value: ""
    status: true
    values:
      - "COMPREHENSIVE"                                                       #  Valid value — enables comprehensive VPC flow logs

  constraints/compute.vmCanIpForward:
    inherit_from_parent: false
    suggested_value: ""
    status: true
    values: []                                                                #  Empty allow = deny ALL IP forwarding on VMs
                                                                              #   This blocks NAT VMs, VPN VMs, etc. Confirm if intentional.

  constraints/compute.managed.allowedVlanAttachmentEncryption:
    inherit_from_parent: false
    suggested_value: ""
    status: true
    values:
      - "IPSEC"                                                               #  Only allow IPSEC-encrypted VLAN attachments

  constraints/compute.requireSslPolicy:
    inherit_from_parent: false
    suggested_value: ""
    status: true
    values: []                                                                #  Empty allow = no SSL policies allowed on LBs
                                                                              #   Add specific SSL policy resource names if needed, or set inherit_from_parent: true

  constraints/compute.sharedReservationsOwnerProjects:
    inherit_from_parent: true
    suggested_value: ""
    status: true
    values: []                                                                #  Inherits from parent — empty values OK here

  constraints/compute.restrictLoadBalancerCreationForTypes:
    inherit_from_parent: false
    suggested_value: ""
    status: true
    values:
      - "INTERNAL"                                                            #  Only internal LBs allowed

  constraints/compute.restrictSharedVpcHostProjects:
    inherit_from_parent: false
    suggested_value: ""
    status: true
    values:
      - "projects/sw-dev-udp-host-network"
      - "projects/sw-test-udp-host-network"
      - "projects/sw-prod-udp-host-network"                                  #  Restrict Shared VPC to specific host projects

  constraints/compute.restrictVpcPeering:
    inherit_from_parent: false
    suggested_value: ""
    status: true
    values:
      - "projects/sw-dev-udp-host-network/global/networks/vpc-sw-dev-udp-host"
      - "projects/sw-test-udp-host-network/global/networks/vpc-sw-test-udp-host"
      - "projects/sw-prod-udp-host-network/global/networks/vpc-sw-prod-udp-host"  #  Allow peering only to specific VPCs

  constraints/compute.restrictCloudNATUsage:
    inherit_from_parent: false
    suggested_value: ""
    status: true
    values: []                                                                #  Empty allow = deny ALL Cloud NAT usage in folder
                                                                              #   Add project/subnetwork paths if Cloud NAT is needed, e.g:
                                                                              #   - "projects/sw-dev-udp-host-network/regions/us-east4/routers/my-router"

  constraints/compute.restrictDedicatedInterconnectUsage:
    inherit_from_parent: false
    suggested_value: ""
    status: true
    values: []                                                                #  Deny all dedicated interconnect — acceptable if not used

  constraints/compute.restrictPartnerInterconnectUsage:
    inherit_from_parent: false
    suggested_value: ""
    status: true
    values: []                                                                #  Deny all partner interconnect — acceptable if not used

  constraints/compute.restrictVpnPeerIPs:
    inherit_from_parent: false
    suggested_value: ""
    status: true
    values: []                                                                #  Empty allow = deny ALL VPN peer IPs
                                                                              #   Add allowed peer IP addresses if VPN tunnels are in use

  # ── IAM ──────────────────────────────────────────────────────────────────
  constraints/iam.serviceAccountKeyExposureResponse:
    inherit_from_parent: true
    suggested_value: ""
    status: true
    values: []                                                                #  Inherits response action from parent org

  constraints/iam.allowServiceAccountCredentialLifetimeExtension:
    inherit_from_parent: true
    suggested_value: ""
    status: true
    values: []                                                                #  Inherits from parent — no extension by default

  constraints/iam.serviceAccountKeyExpiryHours:
    inherit_from_parent: false
    suggested_value: ""
    status: true
    values:
      - "2160"                                                                #  Max key lifetime = 2160h (90 days)

  # ── GCP Resources ────────────────────────────────────────────────────────
  constraints/gcp.resourceLocations:
    inherit_from_parent: false
    suggested_value: ""
    status: true
    values:
      - "us-east4"
      - "us-central1"                                                         #  Restrict resource creation to these two regions

  constraints/gcp.restrictServiceUsage:
    inherit_from_parent: false
    suggested_value: ""
    status: true
    values: [servicemanagement.googleapis.com, cloudresourcemanager.googleapis.com]
    #  ERROR — Values here MUST be GCP service API names in format:
    #            "<service>.googleapis.com"
    #    Examples: bigquery.googleapis.com, storage.googleapis.com, file.googleapis.com


  # ── Resource Manager ─────────────────────────────────────────────────────
  constraints/resourcemanager.allowedImportSources:
    inherit_from_parent: true
